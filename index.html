<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>~/huy</title>
    <meta name="description" content="Web developer, PHP and Symfony." />
    <link rel="icon" href="favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link
      rel="preload"
      href="assets/shantell-sans.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link rel="stylesheet" href="assets/styles.css" />
    <script>
      // Set the theme before first paint so there's no flash of the wrong mode.
      (function () {
        let theme;
        try {
          theme = localStorage.getItem("theme");
        } catch (e) {}
        if (!theme) {
          theme = matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light";
        }
        document.documentElement.dataset.theme = theme;
      })();
    </script>
  </head>
  <body>
    <main class="wrap">
      <div class="doodle">
        <img
          class="avatar-desktop"
          src="assets/avatar.webp"
          alt=""
          width="268"
          height="430"
        />
        <button
          class="theme-toggle theme-toggle--window"
          type="button"
          aria-label="Toggle dark mode"
        >
          <img
            class="icon-moon"
            src="assets/moon.webp"
            alt=""
            width="64"
            height="64"
          />
          <img
            class="icon-sun"
            src="assets/sun.webp"
            alt=""
            width="64"
            height="64"
          />
        </button>
      </div>
      <img

        src="assets/avatar.webp"

        width="268"
        height="430"
      />
      <h1 class="name">Phan Huy Tran</h1>
      <p class="statement">Web developer, PHP and Symfony.</p>
      <p class="statement-sub">
        Worked on the Bayer 04 Leverkusen online shop and built internal tools
        during my apprenticeship at Team Neusta in Bremen.
      </p>
      <p class="contact">
        <a href="mailto:phanhuytran55@gmail.com">phanhuytran55@gmail.com</a>
        <span class="contact-dot" aria-hidden="true">&middot;</span>
        <a href="tel:+4917627884566">+49 176 27884566</a>

        <a href="https://www.linkedin.com/in/phan-huy-tran-aa7944186/"
          >linkedin</a
        >
      </p>
    </main>
    <button
      class="theme-toggle theme-toggle--corner"
      type="button"
      aria-label="Toggle dark mode"
    >
      <img
        class="icon-moon"
        src="assets/moon.webp"

        width="64"

      />
      <img
        class="icon-sun"

        alt=""

    </button>
    <script type="module" src="assets/theme.js"></script>

</html>
