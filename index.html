<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <title>~/huy</title>
    <meta name="description" content="Web developer, PHP and Symfony." />
    <link rel="icon" href="favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link
      rel="preload"
      href="assets/shantell-sans.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <script>
      // Apply the saved/OS theme before first paint to avoid a flash. Must stay a
      // classic blocking inline script — a module or external file runs too late.
      try {
        const stored = localStorage.getItem("theme");
        const dark = stored
          ? stored === "dark"
          : matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.dataset.theme = dark ? "dark" : "light";
      } catch {
        document.documentElement.dataset.theme = "light";
      }
    </script>
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <main class="wrap">
      <div class="doodle">
        <img
          class="avatar-desktop"
          src="assets/avatar.webp"
          alt=""
          width="268"
          height="430"
        />
        <button
          class="theme-toggle toggle-doodle"
          type="button"
          aria-label="Toggle dark mode"
        ></button>
      </div>
      <img
        class="avatar-mobile"
        src="assets/avatar.webp"
        alt=""
        width="268"
        height="430"
      />

      </p>

        <a href="mailto:phanhuytran55@gmail.com">phanhuytran55@gmail.com</a>
        <span class="contact-dot" aria-hidden="true">&middot;</span>
        <a href="tel:+4917627884566">+49 176 27884566</a>
        <span class="contact-dot" aria-hidden="true">&middot;</span>
        <a href="https://www.linkedin.com/in/phan-huy-tran-aa7944186/"
          >linkedin</a
        >
      </p>
    </main>
    <button
      class="theme-toggle toggle-plain"
      type="button"
      aria-label="Toggle dark mode"
    ></button>

    <script type="module" src="assets/theme.js"></script>
  </body>
</html>
